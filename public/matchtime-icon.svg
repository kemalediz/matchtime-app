<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <!-- App-icon tile -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- Stopwatch + football mark, centred. White on blue. -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- crown / top button -->
    <rect x="226" y="58" width="60" height="42" rx="14" fill="#ffffff" stroke="none"/>
    <rect x="245" y="96" width="22" height="40" rx="8" fill="#ffffff" stroke="none"/>
    <!-- side lugs (stopwatch buttons) -->
    <rect x="150" y="120" width="44" height="20" rx="10" fill="#ffffff" stroke="none" transform="rotate(-40 172 130)"/>
    <rect x="318" y="120" width="44" height="20" rx="10" fill="#ffffff" stroke="none" transform="rotate(40 340 130)"/>

    <!-- bezel ring (the watch face / ball outline) -->
    <circle cx="256" cy="280" r="150" stroke-width="24"/>

    <!-- football: central pentagon -->
    <polygon points="256,234 299.7,265.8 283,317.2 229,317.2 212.3,265.8"
             fill="#ffffff" stroke="none"/>
    <!-- seams from each pentagon vertex out toward the bezel -->
    <g stroke-width="14">
      <line x1="256"   y1="234"   x2="256"   y2="160"/>
      <line x1="299.7" y1="265.8" x2="370.1" y2="242.9"/>
      <line x1="283"   y1="317.2" x2="326.6" y2="377.1"/>
      <line x1="229"   y1="317.2" x2="185.4" y2="377.1"/>
      <line x1="212.3" y1="265.8" x2="141.9" y2="242.9"/>
    </g>
  </g>
</svg>
